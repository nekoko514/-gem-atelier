<style>
:root{--ink:#0f0c14;--velvet:#171221;--gold:#d4b483;--paper:#efe9de}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden;background:var(--ink)}body{font-family:system-ui,"Yu Gothic",sans-serif;color:var(--paper);background:radial-gradient(ellipse 90% 55% at 50% 26%,#241a33 0%,transparent 60%),radial-gradient(ellipse 120% 90% at 50% 110%,#0a0810 0%,transparent 70%),var(--velvet)}#stage{position:fixed;inset:0;touch-action:none}canvas{display:block;width:100%;height:100%}header{position:fixed;top:0;left:0;right:0;z-index:2;padding:calc(env(safe-area-inset-top,0px) + 16px) 24px 0;text-align:center;pointer-events:none}.eyebrow{font-size:9px;letter-spacing:.34em;color:#8a7658;text-transform:uppercase;margin-bottom:8px}h1{font-family:Georgia,"Yu Mincho",serif;font-weight:500;font-size:clamp(23px,6vw,35px);letter-spacing:.13em;text-shadow:0 2px 24px #000}.sub{margin-top:5px;font-size:11px;letter-spacing:.18em;color:rgba(212,180,131,.64)}#hint{position:fixed;left:0;right:0;top:38%;z-index:2;text-align:center;font-size:10px;letter-spacing:.3em;color:rgba(212,180,131,.4);pointer-events:none;transition:opacity .7s}#panel{position:fixed;left:0;right:0;bottom:0;z-index:3;padding:10px 0 calc(env(safe-area-inset-bottom,0px) + 12px);background:linear-gradient(to top,rgba(10,8,16,.93) 62%,transparent)}.rowlabel{font-size:9px;letter-spacing:.32em;color:rgba(212,180,131,.48);padding:0 20px 5px;text-transform:uppercase}.row{display:flex;gap:8px;overflow-x:auto;padding:2px 18px 10px;scrollbar-width:none}.row::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;border:1px solid rgba(212,180,131,.24);border-radius:999px;padding:8px 15px;color:rgba(239,233,222,.68);background:rgba(23,18,33,.62);font:12px/1 Georgia,"Yu Mincho",serif;letter-spacing:.08em;cursor:pointer}.cuts .chip{border-radius:8px;font-size:11px}.chip.on{color:#0f0c14;background:var(--gold);border-color:var(--gold);font-weight:700}#tuneBtn{position:fixed;righ <body>
<div id="stage"></div><header><div class="eyebrow">Gem Atelier / Optics of Light</div><h1 id="title">Diamond</h1><div class="sub" id="sub">Brilliant cut</div></header><p id="hint">DRAG TO TURN</p><div id="toast"></div><button id="tuneBtn">TUNE</button><div id="tune"><div class="knob"><label><span>HUE</span><span id="hueVal"></span></label><input id="hueRange" type="range" min="0" max="360" value="210"></div><div class="knob"><label><span>SAT</span><span id="satVal"></span></label><input id="satRange" type="range" min="0" max="100" value="45"></div><div class="knob"><label><span>SIZE</span><span id="sizeVal"></span></label><input id="sizeRange" type="range" min="45" max="120" value="72"></div></div><div id="panel"><div class="rowlabel">Material</div><div class="row" id="rowMat"></div><div class="rowlabel">Cut</div><div class="row cuts" id="rowCut"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const $=id=>document.getElementById(id),toastEl=$('toast');function toast(m){toastEl.textContent=m;toastEl.style.display='block';clearTimeout(toast.t);toast.t=setTimeout(()=>toastEl.style.display='none',8000)}addEventListener('error',e=>toast('[error] '+e.message));if(!window.THREE)throw Error('Three.js is unavailable');
const chunk=`float spow(float x,float y){return pow(max(x,0.0001),y);}float hash(vec3 p){p=fract(p*0.3183099+0.1);p*=17.0;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}vec3 hash3(vec3 p){return vec3(hash(p),hash(p+31.7),hash(p+113.3));}float vnoise(vec3 p){vec3 ip=floor(p);vec3 f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(mix(hash(ip),hash(ip+vec3(1,0,0)),f.x),mix(hash(ip+vec3(0,1,0)),hash(ip+vec3(1,1,0)),f.x),f.y),mix(mix(hash(ip+vec3(0,0,1)),hash(ip+vec3(1,0,1)),f.x),mix(hash(ip+vec3(0,1,1)),hash(ip+vec3(1,1,1)),f.x),f.y),f.z);}float fbm(vec3 p){float v=0.;float a=.5;for(int k=0;k<4;k++){v+=a*vnoise(p);p*=2.03;a*=.5;}return v;}vec3 hsv2rgb(vec3 c){vec3 rgb=clamp(abs(mod(c.x*6.+vec3(0,4,2),6.)-3.)-1.,0.,1.);rgb=rgb*rgb*(3.-2.*rgb);return c.z*mix(vec3(1),rgb,c.y);}float fres(vec3 N,vec3 V,float p){return spow(clamp(1.-dot(N,V),0.,1.),p);}`;
const vert=`varying vec3 vN;varying vec3 vW;varying vec3 vO;void main(){vO=position;vec4 wp=modelMatrix*vec4(position,1.);vW=wp.xyz;vN=normalize(mat3(modelMatrix)*normal);gl_Position=projectionMatrix*viewMatrix*wp;}`;
const head=`precision highp float;varying vec3 vN;varying vec3 vW;varying vec3 vO;uniform float uTime;uniform vec3 uL1;uniform vec3 uL2;uniform float uHue;uniform float uSat;${chunk}`;
const frag={
diamond:head+`void main(){vec3 N=normalize(vN),V=normalize(cameraPosition-vW),L1=normalize(uL1-vW),L2=normalize(uL2-vW),R=reflect(-V,N);float facet=hash(floor(N*24.+.5));float ndv=clamp(dot(N,V),0.,1.);vec3 tint=hsv2rgb(vec3(uHue,uSat*.35,.9));vec3 body=mix(vec3(.05,.05,.08),tint,spow(ndv,1.5)*.35+facet*.15);float disp=fract(ndv*2.4+facet*3.+uTime*.02);vec3 fire=hsv2rgb(vec3(disp,.75,1.));float g1=spow(clamp(dot(R,L1),0.,1.),240.);float g2=spow(clamp(dot(R,L2),0.,1.),240.);float gw=spow(clamp(dot(R,L1),0.,1.),900.)*3.+spow(clamp(dot(R,L2),0.,1.),900.)*3.;float tw=smoothstep(.94,1.,sin(facet*40.+uTime*2.2)*.5+.5)*(.3+.7*facet);vec3 inner=hsv2rgb(vec3(fract(facet*7.+uTime*.05),.8,1.))*tw*.9;gl_FragColor=vec4(body+fire*(g1+g2)*2.6+vec3(1)*gw+inner+tint*fres(N,V,3.)*.6,1.);}`,
clear:head+`float soft(vec3 R,vec3 d,float s){return spow(clamp(dot(R,normalize(d)),0.,1.),s);}void main(){vec3 N=normalize(vN);if(!gl_FrontFacing)N=-N;vec3 V=normalize(cameraPosition-vW),L1=normalize(uL1-vW),L2=normalize(uL2-vW),R=reflect(-V,N);float fr=fres(N,V,2.2);float ndv=clamp(dot(N,V),0.,1.);vec3 col=hsv2rgb(vec3(uHue,uSat,1.))*.1;col+=vec3(1,.98,.95)*soft(R,vec3(0,1,.2),20.)*.5+vec3(.9,.95,1)*soft(R,vec3(-.8,.3,.5),50.)*.35;float h1=spow(clamp(dot(R,L1),0.,1.),700.),h2=spow(clamp(dot(R,L2),0.,1.),700.);col+=vec3(1)*(h1*4.+h2*2.5)+hsv2rgb(vec3(fract(ndv*1.8+uHue),.6,1.))*fr*.35+vec3(.9,.95,1)*fr*.6;gl_FragColor=vec4(col,clamp(.15+fr*.78+h1+h2,0.,1.));}`,
glossy:head+`float soft(vec3 R,vec3 d,float s){return spow(clamp(dot(R,normalize(d)),0.,1.),s);}void main(){vec3 N=normalize(vN),V=normalize(cameraPosition-vW),L1=normalize(uL1-vW),L2=normalize(uL2-vW),R=reflect(-V,N);vec3 base=hsv2rgb(vec3(uHue,uSat,.34));float ndl=clamp(dot(N,L1),0.,1.);vec3 col=base*(.25+.75*ndl);col+=vec3(1,.98,.95)*soft(R,vec3(0,1,.2),18.)*.55+vec3(.9,.92,1)*soft(R,vec3(-.8,.3,.5),40.)*.35+vec3(1,.9,.85)*soft(R,vec3(.9,.1,.4),60.)*.3;col+=vec3(1)*spow(clamp(dot(R,L1),0.,1.),600.)*4.+vec3(1)*spow(clamp(dot(R,L2),0.,1.),600.)*2.5+mix(vec3(.4),base*2.,.5)*fres(N,V,4.);gl_FragColor=vec4(col,1.);}`,
glitter:head+`void main(){vec3 N=normalize(vN),V=normalize(cameraPosition-vW),L1=normalize(uL1-vW),L2=normalize(uL2-vW);float ndl=clamp(dot(N,L1),0.,1.)*.5+.5;vec3 col=hsv2rgb(vec3(uHue,uSat,.18))*ndl;vec3 cell=floor(vO*34.);vec3 Nf=normalize(N+(hash3(cell)*2.-1.)*.85);float s1=spow(clamp(dot(reflect(-L1,Nf),V),0.,1.),90.),s2=spow(clamp(dot(reflect(-L2,Nf),V),0.,1.),90.);float flash=smoothstep(.35,.95,s1+s2);vec3 fc=hsv2rgb(vec3(fract(uHue+hash(cell+7.)*.3-.1),clamp(uSat*.7+.15,0.,1.),1.));col+=fc*flash*3.2+fc*smoothstep(.75,1.,hash(cell+3.))*clamp(dot(Nf,L1),0.,1.)*.35+hsv2rgb(vec3(uHue,uSat*.5,.5))*fres(N,V,3.5)*.6;gl_FragColor=vec4(col,1.);}`,
opal:head+`void main(){vec3 N=normalize(vN),V=normalize(cameraPosition-vW),L1=normalize(uL1-vW);float ndv=clamp(dot(N,V),0.,1.);float wrap=clamp(dot(N,L1)*.5+.5,0.,1.);float edge=spow(1.-ndv,1.35);vec3 milk=mix(vec3(.54,.55,.62),vec3(.86,.84,.90),wrap);float pn=fbm(vO*3.2+5.);float pat=smoothstep(.42,.62,fbm(vO*4.5+11.));float hue=fract(pn*2.2+ndv*.9+uHue+uTime*.015);vec3 play=hsv2rgb(vec3(hue,clamp(uSat+.22,0.,1.),.92));float amt=pat*(.18+.58*edge);vec3 col=mix(milk,play,amt*.62)+play*amt*.18;col+=vec3(.75,.78,.95)*edge*.18;col+=vec3(1)*spow(clamp(dot(reflect(-V,N),L1),0.,1.),120.)*.28;col=col/(vec3(1.)+col*.28);gl_FragColor=vec4(col,1.);}`,
creamy:head+`void main(){vec3 N=normalize(vN),V=normalize(cameraPosition-vW),L1=normalize(uL1-vW),L2=normalize(uL2-vW);float blush=fbm(vO*2.)*.6;vec3 c1=hsv2rgb(vec3(uHue,uSat*.35,.95)),c2=hsv2rgb(vec3(fract(uHue+.04),uSat*.55,.92));vec3 base=mix(c1,c2,blush);float wrap=clamp(dot(N,L1)*.5+.5,0.,1.);vec3 col=base*(.35+.65*wrap);float tr=spow(clamp(dot(V,-L1),0.,1.),3.)*.55+spow(clamp(dot(V,-L2),0.,1.),3.)*.3;col+=hsv2rgb(vec3(uHue,clamp(uSat*.8+.1,0.,1.),1.))*tr+c1*fres(N,V,2.8)*.35+vec3(1)*spow(clamp(dot(reflect(-V,N),L1),0.,1.),24.)*.12;gl_FragColor=vec4(col,1.);}`,
butterfly:head+`void main(){vec3 N=normalize(vN);if(!gl_FrontFacing)N=-N;vec3 V=normalize(cameraPosition-vW),L1=normalize(uL1-vW);float ndv=clamp(dot(N,V),0.,1.),ndl=clamp(dot(N,L1),0.,1.);float hue=fract(uHue+(1.-ndv)*.22);vec3 col=hsv2rgb(vec3(hue,clamp(uSat+.2,0.,1.),1.))*(.4+.6*ndl);float ridge=sin(vO.y*160.+vnoise(vO*40.)*6.)*.5+.5;col*=.85+.3*ridge;vec3 cell=floor(vO*140.);vec3 Nf=normalize(N+(hash3(cell)*2.-1.)*.6);float sp=spow(clamp(dot(reflect(-L1,Nf),V),0.,1.),70.);col+=vec3(.85,.95,1)*smoothstep(.4,.9,sp)*2.2+hsv2rgb(vec3(fract(hue+.12),.8,.9))*fres(N,V,3.)*.5;gl_FragColor=vec4(col,1.);}`
};
function merge(parts){let total=0,arrs=parts.map(g=>{let a=g.toNonIndexed().attributes.position.array;total+=a.length;return a}),pos=new Float32Array(total),off=0;for(const a of arrs){pos.set(a,off);off+=a.length}let geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.computeVertexNormals();return geo}function norm(g){g.center();g.computeBoundingSphere();let k=1.05/g.boundingSphere.radius;g.scale(k,k,k);g.computeVertexNormals();return g}function cyl(a,b,h,s,y,t){let g=new THREE.CylinderGeometry(a,b,h,s,1,false,t||0);g.translate(0,y,0);return g}function ext(shape,o){let g=new THREE.ExtrudeGeometry(shape,Object.assign({depth:.42,bevelEnabled:true,bevelThickness:.3,bevelSize:.18,bevelSegments:1,curveSegments:6},o||{}));g.rotateX(-Math.PI/2);return norm(merge([g]))}
const build={brilliant(){return norm(merge([new THREE.LatheGeometry([new THREE.Vector2(0,.62),new THREE.Vector2(.5,.6),new THREE.Vector2(.98,.2),new THREE.Vector2(1,.05),new THREE.Vector2(.98,-.05),new THREE.Vector2(.02,-1.05)],16)]))},fine(){return norm(merge([new THREE.LatheGeometry([new THREE.Vector2(0,.62),new THREE.Vector2(.34,.61),new THREE.Vector2(.62,.5),new THREE.Vector2(.84,.34),new THREE.Vector2(.98,.16),new THREE.Vector2(1,.04),new THREE.Vector2(.98,-.06),new THREE.Vector2(.7,-.5),new THREE.Vector2(.3,-.85),new THREE.Vector2(.02,-1.08)],24)]))},rose(){let a=new THREE.SphereGeometry(1,10,4,0,Math.PI*2,0,Math.PI/2),b=new THREE.CircleGeometry(1,10);b.rotateX(Math.PI/2);return norm(merge([a,b]))},briolette(){let p=[[0,1.25],[.18,1],[.38,.72],[.55,.42],[.66,.1],[.68,-.2],[.6,-.52],[.42,-.78],[.18,-.95],[0,-1]].map((q,i)=>new THREE.Vector2(q[0]*(i%2? .94:1),q[1]));return norm(merge([new THREE.LatheGeometry(p,12)]))},step(){return norm(merge([cyl(.6,.78,.16,8,.5),cyl(.78,.92,.16,8,.34),cyl(.92,1,.16,8,.18),cyl(1,1,.14,8,.03),cyl(1,.86,.2,8,-.14),cyl(.86,.66,.2,8,-.34),cyl(.66,.4,.2,8,-.54),cyl(.4,.1,.18,8,-.73)]))},princess(){return norm(merge([cyl(.58,1,.5,4,.25,Math.PI/4),cyl(1,.03,.95,4,-.47,Math.PI/4)]))},emerald(){let g=merge([cyl(.72,1,.32,8,.36),cyl(1,1,.22,8,.09),cyl(1,.5,.5,8,-.27)]);g.scale(1.28,1,.8);return norm(g)},cushion(){let s=new THREE.Shape(),w=.9,r=.42;s.moveTo(-w+r,-w);s.lineTo(w-r,-w);s.quadraticCurveTo(w,-w,w,-w+r);s.lineTo(w,w-r);s.quadraticCurveTo(w,w,w-r,w);s.lineTo(-w+r,w);s.quadraticCurveTo(-w,w,-w,w-r);s.lineTo(-w,-w+r);s.quadraticCurveTo(-w,-w,-w+r,-w);return ext(s)},oval(){let s=new THREE.Shape();s.absellipse(0,0,.78,1.05,0,Math.PI*2,false,0);return ext(s,{curveSegments:14})},pear(){let s=new THREE.Shape();s.moveTo(0,1.1);s.quadraticCurveTo(.55,.5,.62,-.1);s.quadraticCurveTo(.62,-.85,0,-.9);s.quadraticCurveTo(-.62,-.85,-.62,-.1);s.quadraticCurveTo(-.55,.5,0,1.1);return ext(s,{curveSegments:8})},marquise(){let s=new THREE.Shape();s.moveTo(0,1.15);s.quadraticCurveTo(.72,0,0,-1.15);s.quadraticCurveTo(-.72,0,0,1.15);return ext(s,{curveSegments:8})},heart(){let s=new THREE.Shape();s.moveTo(0,-1);s.bezierCurveTo(-1.3,-.2,-1.1,.75,-.5,.75);s.bezierCurveTo(-.15,.75,0,.45,0,.3);s.bezierCurveTo(0,.45,.15,.75,.5,.75);s.bezierCurveTo(1.1,.75,1.3,-.2,0,-1);return ext(s,{curveSegments:8})},trilliant(){let s=new THREE.Shape();s.moveTo(0,1.05);s.quadraticCurveTo(.66,.35,.95,-.6);s.quadraticCurveTo(0,-.95,-.95,-.6);s.quadraticCurveTo(-.66,.35,0,1.05);return ext(s,{curveSegments:7})},cabochon(){return norm(new THREE.LatheGeometry([new THREE.Vector2(0,.62),new THREE.Vector2(.45,.54),new THREE.Vector2(.82,.28),new THREE.Vector2(1,-.1),new THREE.Vector2(.98,-.2),new THREE.Vector2(0,-.24)],48))},sphere(){return norm(new THREE.SphereGeometry(1,64,48))},rough(){return norm(merge([new THREE.OctahedronGeometry(1.1,0)]))}};
const cuts='brilliant Fine rose briolette step princess emerald cushion oval pear marquise heart trilliant cabochon sphere rough'.split(' ');const cutNames={brilliant:'Brilliant',Fine:'Fine',rose:'Rose',briolette:'Briolette',step:'Step',princess:'Princess',emerald:'Emerald',cushion:'Cushion',oval:'Oval',pear:'Pear',marquise:'Marquise',heart:'Heart',trilliant:'Trilliant',cabochon:'Cabochon',sphere:'Sphere',rough:'Rough'};build.Fine=build.fine;
const mats=[['diamond','Diamond',210,45],['clear','Crystal',195,18],['glossy','Candy',350,90],['glitter','Glitter',280,70],['opal','Opal',0,60],['creamy','Milky',22,35],['butterfly','Butterfly',200,85]];
const stage=$('stage'),renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);stage.appendChild(renderer.domElement);const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,.1,50);camera.position.set(0,.15,4.9);const uniforms={uTime:{value:0},uL1:{value:new THREE.Vector3(3,4,3)},uL2:{value:new THREE.Vector3(-4,1,2)},uHue:{value:210/360},uSat:{value:.45}},materials={};for(const m of mats)materials[m[0]]=new THREE.ShaderMaterial({vertexShader:vert,fragmentShader:frag[m[0]],uniforms,side:THREE.DoubleSide,transparent:m[0]==='clear',depthWrite:m[0]!=='clear'});const cache={},root=new THREE.Group();scene.add(root);const gem=new THREE.Mesh(getGeo('brilliant'),materials.diamond);root.add(gem);root.scale.setScalar(.72);function getGeo(k){return cache[k]||(cache[k]=build[k]())}
let curMat='diamond',curCut='brilliant';const title=$('title'),sub=$('sub'),hue=$('hueRange'),sat=$('satRange'),size=$('sizeRange');function setHue(v){hue.value=v;uniforms.uHue.value=v/360;$('hueVal').textContent=v+'deg'}function setSat(v){sat.value=v;uniforms.uSat.value=v/100;$('satVal').textContent=v+'%'}function setSize(v){size.value=v;root.scale.setScalar(v/100);$('sizeVal').textContent=v+'%'}function mark(id,key){document.querySelectorAll('#'+id+' .chip').forEach(b=>b.classList.toggle('on',b.dataset.key===key))}function header(){let m=mats.find(x=>x[0]===curMat);title.textContent=m[1];sub.textContent=cutNames[curCut]+' cut'}function btn(row,key,name,fn){let b=document.createElement('button');b.className='chip';b.dataset.key=key;b.textContent=name;b.onclick=fn;row.appendChild(b)}for(const m of mats)btn($('rowMat'),m[0],m[1],()=>{curMat=m[0];gem.material=materials[m[0]];setHue(m[2]);setSat(m[3]);mark('rowMat',m[0]);header()});for(const k of cuts)btn($('rowCut'),k,cutNames[k],()=>{curCut=k;try{gem.geometry=getGeo(k)}catch(e){toast('Cut generation error: '+e.message)}mark('rowCut',k);header()});mark('rowMat','diamond');mark('rowCut','brilliant');setHue(210);setSat(45);setSize(72);header();hue.oninput=e=>setHue(+e.target.value);sat.oninput=e=>setSat(+e.target.value);size.oninput=e=>setSize(+e.target.value);$('tuneBtn').onclick=()=>$('tune').classList.toggle('open');
let drag=false,px=0,py=0,vx=0,vy=0,idle=0;const cv=renderer.domElement;cv.onpointerdown=e=>{drag=true;px=e.clientX;py=e.clientY;$('hint').style.opacity=0;cv.setPointerCapture(e.pointerId)};cv.onpointermove=e=>{if(!drag)return;vx=(e.clientX-px)*.006;vy=(e.clientY-py)*.006;root.rotation.y+=vx;root.rotation.x+=vy;px=e.clientX;py=e.clientY;idle=0};cv.onpointerup=cv.onpointercancel=()=>drag=false;onresize=()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)};const clock=new THREE.Clock(),reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;function tick(){requestAnimationFrame(tick);let t=clock.getElapsedTime();uniforms.uTime.value=t;uniforms.uL1.value.set(Math.sin(t*.5)*4,3.5,Math.cos(t*.5)*4);uniforms.uL2.value.set(Math.cos(t*.3)*-4,1.2+Math.sin(t*.4),3);if(!drag){root.rotation.y+=vx;root.rotation.x+=vy;vx*=.94;vy*=.94;idle++;if(!reduce&&idle>90)root.rotation.y+=.004}root.rotation.x=Math.max(-1.2,Math.min(1.2,root.rotation.x));renderer.render(scene,camera)}tick();
</script>
