<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gem Atelier</title>
<style>
  :root{--ink:#0f0c14;--velvet:#171221;--gold:#d4b483;--gold-dim:#8a7658;--paper:#efe9de;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--ink);}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;color:var(--paper);background:radial-gradient(ellipse 90% 55% at 50% 26%,#241a33 0%,transparent 60%),radial-gradient(ellipse 120% 90% at 50% 110%,#0a0810 0%,transparent 70%),var(--velvet);}
  #stage{position:fixed;inset:0;touch-action:none;} canvas{display:block;width:100%;height:100%;}
  header{position:fixed;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top,0px) + 16px) 24px 0;text-align:center;pointer-events:none;z-index:2;}
  .eyebrow{font-size:9px;letter-spacing:.34em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:8px;}
  h1{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-weight:500;font-size:clamp(22px,6vw,34px);letter-spacing:.14em;text-shadow:0 2px 24px rgba(0,0,0,.6);transition:opacity .3s;}
  .sub{margin-top:5px;font-size:11px;letter-spacing:.18em;color:rgba(212,180,131,.6);transition:opacity .3s;}
  .fading h1,.fading .sub{opacity:0;}
  #panel{position:fixed;left:0;right:0;bottom:0;z-index:3;padding:10px 0 calc(env(safe-area-inset-bottom,0px) + 12px);background:linear-gradient(to top,rgba(10,8,16,.92) 60%,transparent);}
  .rowlabel{font-size:9px;letter-spacing:.34em;color:rgba(212,180,131,.45);padding:0 20px 5px;text-transform:uppercase;}
  .row{display:flex;gap:8px;overflow-x:auto;padding:2px 18px 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}.row::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:12px;letter-spacing:.1em;color:rgba(239,233,222,.66);background:rgba(23,18,33,.6);border:1px solid rgba(212,180,131,.22);border-radius:999px;padding:8px 15px;cursor:pointer;transition:color .2s,border-color .2s,background .2s;}
  .row.cuts .chip{border-radius:9px;font-size:11px;}.chip:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}.chip.on{color:var(--ink);background:var(--gold);border-color:var(--gold);font-weight:600;}
  #tuneBtn{position:fixed;right:14px;z-index:4;bottom:calc(env(safe-area-inset-bottom,0px) + 158px);font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:11px;letter-spacing:.2em;color:var(--gold);background:rgba(23,18,33,.7);border:1px solid rgba(212,180,131,.4);border-radius:999px;padding:8px 14px;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
  #tune{position:fixed;right:12px;z-index:4;bottom:calc(env(safe-area-inset-bottom,0px) + 200px);width:min(78vw,280px);background:rgba(16,12,24,.88);border:1px solid rgba(212,180,131,.3);border-radius:8px;padding:16px 16px 12px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;}#tune.open{display:block;}
  .knob{margin-bottom:12px;}.knob label{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.24em;color:rgba(212,180,131,.7);margin-bottom:6px;}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(212,180,131,.25);outline:none;}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--paper);border:2px solid var(--gold);box-shadow:0 1px 6px rgba(0,0,0,.5);}#hueRange{background:linear-gradient(to right,#f55,#ff5,#5f5,#5ff,#55f,#f5f,#f55);}
  .hint{position:fixed;left:0;right:0;top:38%;text-align:center;font-size:10px;letter-spacing:.3em;color:rgba(212,180,131,.4);z-index:2;pointer-events:none;transition:opacity 1s;}
  #toast{position:fixed;top:calc(env(safe-area-inset-top,0px)+8px);left:50%;transform:translateX(-50%);z-index:9;max-width:88vw;font-size:11px;line-height:1.5;background:rgba(90,20,30,.92);color:#ffd7d7;border:1px solid rgba(255,120,120,.5);border-radius:8px;padding:8px 12px;display:none;word-break:break-all;}
</style>
</head>
<body>
<div id="stage"></div>
<header id="header"><div class="eyebrow">Gem Atelier / Optics of Light</div><h1 id="title">Diamond</h1><div class="sub" id="sub"></div></header>
<p class="hint" id="hint">DRAG TO TURN</p><div id="toast"></div>
<button id="tuneBtn" type="button">TUNE</button>
<div id="tune"><div class="knob"><label><span>HUE</span><span id="hueVal"></span></label><input type="range" id="hueRange" min="0" max="360" value="210"></div><div class="knob"><label><span>SAT</span><span id="satVal"></span></label><input type="range" id="satRange" min="0" max="100" value="50"></div><div class="knob"><label><span>SIZE</span><span id="sizeVal"></span></label><input type="range" id="sizeRange" min="45" max="120" value="72"></div></div>
<div id="panel"><div class="rowlabel">Material</div><div class="row" id="rowMat"></div><div class="rowlabel">Cut</div><div class="row cuts" id="rowCut"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const toastEl=document.getElementById('toast');
function toast(msg){toastEl.textContent=msg;toastEl.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>toastEl.style.display='none',8000);}
window.addEventListener('error',e=>toast('[error] '+e.message));
if(!window.THREE){toast('Three.js could not be loaded.');throw new Error('Three.js is unavailable');}

const CHUNK=`
float spow(float x,float y){return pow(max(x,0.0001),y);}
float hash(vec3 p){p=fract(p*0.3183099+0.1);p*=17.0;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}
vec3 hash3(vec3 p){return vec3(hash(p),hash(p+31.7),hash(p+113.3));}
float vnoise(vec3 p){vec3 ip=floor(p);vec3 f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(mix(hash(ip),hash(ip+vec3(1.0,0.0,0.0)),f.x),mix(hash(ip+vec3(0.0,1.0,0.0)),hash(ip+vec3(1.0,1.0,0.0)),f.x),f.y),mix(mix(hash(ip+vec3(0.0,0.0,1.0)),hash(ip+vec3(1.0,0.0,1.0)),f.x),mix(hash(ip+vec3(0.0,1.0,1.0)),hash(ip+vec3(1.0,1.0,1.0)),f.x),f.y),f.z);}
float fbm(vec3 p){float v=0.0;float a=0.5;for(int k=0;k<4;k++){v+=a*vnoise(p);p*=2.03;a*=0.5;}return v;}
vec3 hsv2rgb(vec3 c){vec3 rgb=clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),6.0)-3.0)-1.0,0.0,1.0);rgb=rgb*rgb*(3.0-2.0*rgb);return c.z*mix(vec3(1.0),rgb,c.y);}
float fres(vec3 N,vec3 V,float p){return spow(clamp(1.0-dot(N,V),0.0,1.0),p);}
`;
const VERT=`varying vec3 vN;varying vec3 vW;varying vec3 vO;void main(){vO=position;vec4 wp=modelMatrix*vec4(position,1.0);vW=wp.xyz;vN=normalize(mat3(modelMatrix)*normal);gl_Position=projectionMatrix*viewMatrix*wp;}`;
const HEAD=`precision highp float;varying vec3 vN;varying vec3 vW;varying vec3 vO;uniform float uTime;uniform vec3 uL1;uniform vec3 uL2;uniform float uHue;uniform float uSat;${CHUNK}`;
const FRAG={
diamond:HEAD+`void main(){vec3 N=normalize(vN);vec3 V=normalize(cameraPosition-vW);vec3 L1=normalize(uL1-vW);vec3 L2=normalize(uL2-vW);vec3 R=reflect(-V,N);float facet=hash(floor(N*24.0+0.5));float ndv=clamp(dot(N,V),0.0,1.0);vec3 tintD=hsv2rgb(vec3(uHue,uSat*0.35,0.9));vec3 body=mix(vec3(0.05,0.05,0.08),tintD,spow(ndv,1.5)*0.35+facet*0.15);float disp=fract(ndv*2.4+facet*3.0+uTime*0.02);vec3 fireCol=hsv2rgb(vec3(disp,0.75,1.0));float g1=spow(clamp(dot(R,L1),0.0,1.0),240.0);float g2=spow(clamp(dot(R,L2),0.0,1.0),240.0);float gw=spow(clamp(dot(R,L1),0.0,1.0),900.0)*3.0+spow(clamp(dot(R,L2),0.0,1.0),900.0)*3.0;float tw=smoothstep(0.94,1.0,sin(facet*40.0+uTime*2.2)*0.5+0.5)*(0.3+0.7*facet);vec3 inner=hsv2rgb(vec3(fract(facet*7.0+uTime*0.05),0.8,1.0))*tw*0.9;vec3 col=body+fireCol*(g1+g2)*2.6+vec3(1.0)*gw+inner+tintD*fres(N,V,3.0)*0.6;gl_FragColor=vec4(col,1.0);}`,
clear:HEAD+`float softbox2(vec3 R,vec3 d,float s){return spow(clamp(dot(R,normalize(d)),0.0,1.0),s);}void main(){vec3 N=normalize(vN);if(!gl_FrontFacing)N=-N;vec3 V=normalize(cameraPosition-vW);vec3 L1=normalize(uL1-vW);vec3 L2=normalize(uL2-vW);vec3 R=reflect(-V,N);float fr=fres(N,V,2.2);float ndv=clamp(dot(N,V),0.0,1.0);vec3 tint=hsv2rgb(vec3(uHue,uSat,1.0));vec3 col=tint*0.10;col+=vec3(1.0,0.98,0.95)*softbox2(R,vec3(0.0,1.0,0.2),20.0)*0.5;col+=vec3(0.9,0.95,1.0)*softbox2(R,vec3(-0.8,0.3,0.5),50.0)*0.35;float hi1=spow(clamp(dot(R,L1),0.0,1.0),700.0);float hi2=spow(clamp(dot(R,L2),0.0,1.0),700.0);col+=vec3(1.0)*(hi1*4.0+hi2*2.5);col+=hsv2rgb(vec3(fract(ndv*1.8+uHue),0.6,1.0))*fr*0.35;col+=vec3(0.9,0.95,1.0)*fr*0.6;float alpha=clamp(0.15+fr*0.78+hi1+hi2,0.0,1.0);gl_FragColor=vec4(col,alpha);}`,
glossy:HEAD+`float softbox(vec3 R,vec3 d,float size){return spow(clamp(dot(R,normalize(d)),0.0,1.0),size);}void main(){vec3 N=normalize(vN);vec3 V=normalize(cameraPosition-vW);vec3 L1=normalize(uL1-vW);vec3 L2=normalize(uL2-vW);vec3 R=reflect(-V,N);vec3 base=hsv2rgb(vec3(uHue,uSat,0.34));float ndl=clamp(dot(N,L1),0.0,1.0);vec3 col=base*(0.25+0.75*ndl);col+=vec3(1.0,0.98,0.95)*softbox(R,vec3(0.0,1.0,0.2),18.0)*0.55;col+=vec3(0.9,0.92,1.0)*softbox(R,vec3(-0.8,0.3,0.5),40.0)*0.35;col+=vec3(1.0,0.9,0.85)*softbox(R,vec3(0.9,0.1,0.4),60.0)*0.3;col+=vec3(1.0)*spow(clamp(dot(R,L1),0.0,1.0),600.0)*4.0;col+=vec3(1.0)*spow(clamp(dot(R,L2),0.0,1.0),600.0)*2.5;col+=mix(vec3(0.4),base*2.0,0.5)*fres(N,V,4.0);gl_FragColor=vec4(col,1.0);}`,
glitter:HEAD+`void main(){vec3 N=normalize(vN);vec3 V=normalize(cameraPosition-vW);vec3 L1=normalize(uL1-vW);vec3 L2=normalize(uL2-vW);float ndl=clamp(dot(N,L1),0.0,1.0)*0.5+0.5;vec3 col=hsv2rgb(vec3(uHue,uSat,0.18))*ndl;vec3 cell=floor(vO*34.0);vec3 jit=hash3(cell)*2.0-1.0;vec3 Nf=normalize(N+jit*0.85);float s1=spow(clamp(dot(reflect(-L1,Nf),V),0.0,1.0),90.0);float s2=spow(clamp(dot(reflect(-L2,Nf),V),0.0,1.0),90.0);float flash=smoothstep(0.35,0.95,s1+s2);vec3 fc=hsv2rgb(vec3(fract(uHue+hash(cell+7.0)*0.3-0.1),clamp(uSat*0.7+0.15,0.0,1.0),1.0));col+=fc*flash*3.2;float dust=smoothstep(0.75,1.0,hash(cell+3.0))*clamp(dot(Nf,L1),0.0,1.0);col+=fc*dust*0.35;col+=hsv2rgb(vec3(uHue,uSat*0.5,0.5))*fres(N,V,3.5)*0.6;gl_FragColor=vec4(col,1.0);}`,
opal:HEAD+`void main(){vec3 N=normalize(vN);vec3 V=normalize(cameraPosition-vW);vec3 L1=normalize(uL1-vW);float ndv=clamp(dot(N,V),0.0,1.0);float wrap=clamp(dot(N,L1)*0.5+0.5,0.0,1.0);vec3 milk=mix(vec3(0.72,0.72,0.78),vec3(0.97,0.96,0.99),wrap);float pn=fbm(vO*3.2+5.0);float pat=smoothstep(0.42,0.62,fbm(vO*4.5+11.0));float hue=fract(pn*2.2+ndv*0.9+uHue+uTime*0.015);vec3 play=hsv2rgb(vec3(hue,clamp(uSat+0.3,0.0,1.0),1.0));float amt=pat*(0.35+0.85*spow(1.0-ndv,1.2));vec3 col=milk+play*amt*0.9;col+=vec3(0.9,0.85,1.0)*fres(N,V,2.5)*0.3;col+=vec3(1.0)*spow(clamp(dot(reflect(-V,N),L1),0.0,1.0),120.0)*0.8;gl_FragColor=vec4(col,1.0);}`,
creamy:HEAD+`void main(){vec3 N=normalize(vN);vec3 V=normalize(cameraPosition-vW);vec3 L1=normalize(uL1-vW);vec3 L2=normalize(uL2-vW);float blush=fbm(vO*2.0)*0.6;vec3 c1=hsv2rgb(vec3(uHue,uSat*0.35,0.95));vec3 c2=hsv2rgb(vec3(fract(uHue+0.04),uSat*0.55,0.92));vec3 base=mix(c1,c2,blush);float wrap=clamp(dot(N,L1)*0.5+0.5,0.0,1.0);vec3 col=base*(0.35+0.65*wrap);float tr=spow(clamp(dot(V,-L1),0.0,1.0),3.0)*0.55+spow(clamp(dot(V,-L2),0.0,1.0),3.0)*0.3;col+=hsv2rgb(vec3(uHue,clamp(uSat*0.8+0.1,0.0,1.0),1.0))*tr;col+=c1*fres(N,V,2.8)*0.35;col+=vec3(1.0)*spow(clamp(dot(reflect(-V,N),L1),0.0,1.0),24.0)*0.12;gl_FragColor=vec4(col,1.0);}`,
butterfly:HEAD+`void main(){vec3 N=normalize(vN);if(!gl_FrontFacing)N=-N;vec3 V=normalize(cameraPosition-vW);vec3 L1=normalize(uL1-vW);float ndv=clamp(dot(N,V),0.0,1.0);float ndl=clamp(dot(N,L1),0.0,1.0);float hue=fract(uHue+(1.0-ndv)*0.22);vec3 col=hsv2rgb(vec3(hue,clamp(uSat+0.2,0.0,1.0),1.0))*(0.4+0.6*ndl);float ridge=sin(vO.y*160.0+vnoise(vO*40.0)*6.0)*0.5+0.5;col*=0.85+0.3*ridge;vec3 cell=floor(vO*140.0);vec3 Nf=normalize(N+(hash3(cell)*2.0-1.0)*0.6);float sp=spow(clamp(dot(reflect(-L1,Nf),V),0.0,1.0),70.0);col+=vec3(0.85,0.95,1.0)*smoothstep(0.4,0.9,sp)*2.2;col+=hsv2rgb(vec3(fract(hue+0.12),0.8,0.9))*fres(N,V,3.0)*0.5;gl_FragColor=vec4(col,1.0);}`
};

function mergeFlat(parts){let total=0;const arrs=parts.map(g=>{const a=g.toNonIndexed().attributes.position.array;total+=a.length;return a;});const pos=new Float32Array(total);let off=0;for(const a of arrs){pos.set(a,off);off+=a.length;}const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.computeVertexNormals();return geo;}
function normalizeGeo(geo){geo.center();geo.computeBoundingSphere();const k=1.05/geo.boundingSphere.radius;geo.scale(k,k,k);geo.computeVertexNormals();return geo;}
function cyl(rt,rb,h,seg,y,theta){const g=new THREE.CylinderGeometry(rt,rb,h,seg,1,false,theta||0);g.translate(0,y,0);return g;}
function extrudeCut(shape,opts){const geo=new THREE.ExtrudeGeometry(shape,Object.assign({depth:0.42,bevelEnabled:true,bevelThickness:0.3,bevelSize:0.18,bevelSegments:1,curveSegments:6},opts||{}));geo.rotateX(-Math.PI/2);return normalizeGeo(mergeFlat([geo]));}
const CUT_BUILDERS={
brilliant(){const pts=[new THREE.Vector2(0.0,0.62),new THREE.Vector2(0.5,0.6),new THREE.Vector2(0.98,0.2),new THREE.Vector2(1.0,0.05),new THREE.Vector2(0.98,-0.05),new THREE.Vector2(0.02,-1.05)];return normalizeGeo(mergeFlat([new THREE.LatheGeometry(pts,16)]));},
fine(){const pts=[new THREE.Vector2(0.0,0.62),new THREE.Vector2(0.34,0.61),new THREE.Vector2(0.62,0.5),new THREE.Vector2(0.84,0.34),new THREE.Vector2(0.98,0.16),new THREE.Vector2(1.0,0.04),new THREE.Vector2(0.98,-0.06),new THREE.Vector2(0.7,-0.5),new THREE.Vector2(0.3,-0.85),new THREE.Vector2(0.02,-1.08)];return normalizeGeo(mergeFlat([new THREE.LatheGeometry(pts,24)]));},
rose(){const dome=new THREE.SphereGeometry(1.0,10,4,0,Math.PI*2,0,Math.PI/2);const base=new THREE.CircleGeometry(1.0,10);base.rotateX(Math.PI/2);return normalizeGeo(mergeFlat([dome,base]));},
briolette(){const prof=[[0.0,1.25],[0.18,1.0],[0.38,0.72],[0.55,0.42],[0.66,0.1],[0.68,-0.2],[0.6,-0.52],[0.42,-0.78],[0.18,-0.95],[0.0,-1.0]];const pts=prof.map((p,i)=>new THREE.Vector2(p[0]*(i%2===0?1.0:0.94),p[1]));return normalizeGeo(mergeFlat([new THREE.LatheGeometry(pts,12)]));},
step(){const geo=mergeFlat([cyl(0.6,0.78,0.16,8,0.5),cyl(0.78,0.92,0.16,8,0.34),cyl(0.92,1.0,0.16,8,0.18),cyl(1.0,1.0,0.14,8,0.03),cyl(1.0,0.86,0.2,8,-0.14),cyl(0.86,0.66,0.2,8,-0.34),cyl(0.66,0.4,0.2,8,-0.54),cyl(0.4,0.1,0.18,8,-0.73)]);geo.scale(1.3,1.0,0.82);geo.computeVertexNormals();return normalizeGeo(geo);},
princess(){return normalizeGeo(mergeFlat([cyl(0.58,1.0,0.5,4,0.25,Math.PI/4),cyl(1.0,0.03,0.95,4,-0.47,Math.PI/4)]));},
emerald(){const geo=mergeFlat([cyl(0.72,1.0,0.32,8,0.36),cyl(1.0,1.0,0.22,8,0.09),cyl(1.0,0.5,0.5,8,-0.27)]);geo.scale(1.28,1.0,0.8);geo.computeVertexNormals();return normalizeGeo(geo);},
cushion(){const s=new THREE.Shape();const w=0.9,r=0.42;s.moveTo(-w+r,-w);s.lineTo(w-r,-w);s.quadraticCurveTo(w,-w,w,-w+r);s.lineTo(w,w-r);s.quadraticCurveTo(w,w,w-r,w);s.lineTo(-w+r,w);s.quadraticCurveTo(-w,w,-w,w-r);s.lineTo(-w,-w+r);s.quadraticCurveTo(-w,-w,-w+r,-w);return extrudeCut(s);},
oval(){const s=new THREE.Shape();s.absellipse(0,0,0.78,1.05,0,Math.PI*2,false,0);return extrudeCut(s,{curveSegments:14});},
pear(){const s=new THREE.Shape();s.moveTo(0,1.1);s.quadraticCurveTo(0.55,0.5,0.62,-0.1);s.quadraticCurveTo(0.62,-0.85,0,-0.9);s.quadraticCurveTo(-0.62,-0.85,-0.62,-0.1);s.quadraticCurveTo(-0.55,0.5,0,1.1);return extrudeCut(s,{curveSegments:8});},
marquise(){const s=new THREE.Shape();s.moveTo(0,1.15);s.quadraticCurveTo(0.72,0,0,-1.15);s.quadraticCurveTo(-0.72,0,0,1.15);return extrudeCut(s,{curveSegments:8});},
heart(){const s=new THREE.Shape();s.moveTo(0,-1.0);s.bezierCurveTo(-1.3,-0.2,-1.1,0.75,-0.5,0.75);s.bezierCurveTo(-0.15,0.75,0,0.45,0,0.3);s.bezierCurveTo(0,0.45,0.15,0.75,0.5,0.75);s.bezierCurveTo(1.1,0.75,1.3,-0.2,0,-1.0);return extrudeCut(s,{curveSegments:8});},
trilliant(){const s=new THREE.Shape();s.moveTo(0,1.05);s.quadraticCurveTo(0.66,0.35,0.95,-0.6);s.quadraticCurveTo(0,-0.95,-0.95,-0.6);s.quadraticCurveTo(-0.66,0.35,0,1.05);return extrudeCut(s,{curveSegments:7});},
cabochon(){const pts=[new THREE.Vector2(0.0,0.62),new THREE.Vector2(0.45,0.54),new THREE.Vector2(0.82,0.28),new THREE.Vector2(1.0,-0.1),new THREE.Vector2(0.98,-0.2),new THREE.Vector2(0.0,-0.24)];return normalizeGeo(new THREE.LatheGeometry(pts,48));},
sphere(){return normalizeGeo(new THREE.SphereGeometry(1.0,64,48));},rough(){return normalizeGeo(mergeFlat([new THREE.OctahedronGeometry(1.1,0)]));}
};
const CUTS=[{key:'brilliant',name:'Brilliant'},{key:'fine',name:'Fine'},{key:'rose',name:'Rose'},{key:'briolette',name:'Briolette'},{key:'step',name:'Step'},{key:'princess',name:'Princess'},{key:'emerald',name:'Emerald'},{key:'cushion',name:'Cushion'},{key:'oval',name:'Oval'},{key:'pear',name:'Pear'},{key:'marquise',name:'Marquise'},{key:'heart',name:'Heart'},{key:'trilliant',name:'Trilliant'},{key:'cabochon',name:'Cabochon'},{key:'sphere',name:'Sphere'},{key:'rough',name:'Rough'}];
const MATS=[{key:'diamond',name:'Diamond',hue:210,sat:45},{key:'clear',name:'Crystal',hue:195,sat:18},{key:'glossy',name:'Candy',hue:350,sat:90},{key:'glitter',name:'Glitter',hue:280,sat:70},{key:'opal',name:'Opal',hue:0,sat:60},{key:'creamy',name:'Milky',hue:22,sat:35},{key:'butterfly',name:'Butterfly',hue:200,sat:85}];

const stage=document.getElementById('stage');const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);stage.appendChild(renderer.domElement);
const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,0.1,50);camera.position.set(0,0.15,4.9);
const uniforms={uTime:{value:0},uL1:{value:new THREE.Vector3(3,4,3)},uL2:{value:new THREE.Vector3(-4,1,2)},uHue:{value:210/360},uSat:{value:0.45}};
const materials={};for(const m of MATS){const isClear=m.key==='clear';materials[m.key]=new THREE.ShaderMaterial({vertexShader:VERT,fragmentShader:FRAG[m.key],uniforms,side:THREE.DoubleSide,transparent:isClear,depthWrite:!isClear});}
const geoCache={};function getGeo(key){if(!geoCache[key])geoCache[key]=CUT_BUILDERS[key]();return geoCache[key];}
const root=new THREE.Group();scene.add(root);const gem=new THREE.Mesh(getGeo('brilliant'),materials.diamond);root.add(gem);root.scale.setScalar(0.72);
const titleEl=document.getElementById('title'),subEl=document.getElementById('sub'),headerEl=document.getElementById('header'),hueRange=document.getElementById('hueRange'),satRange=document.getElementById('satRange'),sizeRange=document.getElementById('sizeRange'),hueVal=document.getElementById('hueVal'),satVal=document.getElementById('satVal'),sizeVal=document.getElementById('sizeVal');
let curMat='diamond',curCut='brilliant';
function refreshHeader(){headerEl.classList.add('fading');setTimeout(()=>{const m=MATS.find(x=>x.key===curMat);const c=CUTS.find(x=>x.key===curCut);titleEl.textContent=m.name;subEl.textContent=c.name+' cut';headerEl.classList.remove('fading');},180);}
function markChips(rowId,key){document.querySelectorAll('#'+rowId+' .chip').forEach(ch=>ch.classList.toggle('on',ch.dataset.key===key));}
function setHue(v){hueRange.value=v;uniforms.uHue.value=v/360;hueVal.textContent=v+'deg';}
function setSat(v){satRange.value=v;uniforms.uSat.value=v/100;satVal.textContent=v+'%';}
function setSize(v){sizeRange.value=v;root.scale.setScalar(v/100);sizeVal.textContent=v+'%';}
const rowMat=document.getElementById('rowMat');for(const m of MATS){const b=document.createElement('button');b.type='button';b.className='chip';b.textContent=m.name;b.dataset.key=m.key;b.addEventListener('click',()=>{curMat=m.key;gem.material=materials[m.key];setHue(m.hue);setSat(m.sat);markChips('rowMat',m.key);refreshHeader();});rowMat.appendChild(b);}
const rowCut=document.getElementById('rowCut');for(const c of CUTS){const b=document.createElement('button');b.type='button';b.className='chip';b.textContent=c.name;b.dataset.key=c.key;b.addEventListener('click',()=>{curCut=c.key;try{gem.geometry=getGeo(c.key);}catch(err){toast('Cut generation error: '+err.message);}markChips('rowCut',c.key);refreshHeader();});rowCut.appendChild(b);}
markChips('rowMat','diamond');markChips('rowCut','brilliant');titleEl.textContent='Diamond';subEl.textContent='Brilliant cut';setHue(210);setSat(45);setSize(72);
hueRange.addEventListener('input',e=>setHue(+e.target.value));satRange.addEventListener('input',e=>setSat(+e.target.value));sizeRange.addEventListener('input',e=>setSize(+e.target.value));document.getElementById('tuneBtn').addEventListener('click',()=>document.getElementById('tune').classList.toggle('open'));
const reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;let dragging=false,px=0,py=0,vx=0,vy=0,idle=0;const cv=renderer.domElement;
cv.addEventListener('pointerdown',e=>{dragging=true;px=e.clientX;py=e.clientY;document.getElementById('hint').style.opacity=0;cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{if(!dragging)return;vx=(e.clientX-px)*0.006;vy=(e.clientY-py)*0.006;root.rotation.y+=vx;root.rotation.x+=vy;px=e.clientX;py=e.clientY;idle=0;});
const endDrag=()=>{dragging=false;};cv.addEventListener('pointerup',endDrag);cv.addEventListener('pointercancel',endDrag);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
const clock=new THREE.Clock();function tick(){requestAnimationFrame(tick);const t=clock.getElapsedTime();uniforms.uTime.value=t;uniforms.uL1.value.set(Math.sin(t*0.5)*4.0,3.5,Math.cos(t*0.5)*4.0);uniforms.uL2.value.set(Math.cos(t*0.3)*-4.0,1.2+Math.sin(t*0.4),3.0);if(!dragging){root.rotation.y+=vx;root.rotation.x+=vy;vx*=0.94;vy*=0.94;idle++;if(!reduceMotion&&idle>90)root.rotation.y+=0.004;}root.rotation.x=Math.max(-1.2,Math.min(1.2,root.rotation.x));renderer.render(scene,camera);}tick();
</script>
